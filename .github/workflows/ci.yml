name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test -- --run
      - run: npm run typecheck
      - run: npm run build
      - name: Smoke render sample
        run: |
          cat > /tmp/sample.md <<'EOF'
          # Sample

          ```mermaid
          block-beta
          columns 2
          a["chunk_000"]
          b["chunk_001"]
          ```
          EOF
          ./bin/md-preview --title ci-sample --output-dir /tmp/md-preview --base-dir /tmp < /tmp/sample.md
          test -f /tmp/md-preview/ci-sample.html
