name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Package
        run: |
          tar czf md-preview-node.tar.gz \
            README.md \
            build.lua \
            package.json \
            package-lock.json \
            tsconfig.json \
            tsconfig.build.json \
            vitest.config.ts \
            lua \
            src \
            scripts \
            dist \
            bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-preview-node
          path: md-preview-node.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: md-preview-node.tar.gz
          generate_release_notes: true
